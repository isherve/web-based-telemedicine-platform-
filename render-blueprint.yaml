# Render API backend (use with Vercel frontend).
# Deploy this FIRST, then set VITE_API_URL on Vercel to this service URL.
#
# Vercel hosts the React UI; Render hosts Express + SQLite + Socket.IO.

services:
  - type: web
    name: gara-api
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm install --prefix server --omit=dev
    startCommand: cd server && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GARA_DB_PATH
        value: /var/data/gara.db
      - key: GARA_UPLOADS_PATH
        value: /var/data/uploads
      - key: CLIENT_ORIGIN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: DOCTOR_REGISTRATION_TOKEN
        sync: false
      - key: FINANCE_REGISTRATION_TOKEN
        sync: false
      - key: PHARMACY_REGISTRATION_TOKEN
        sync: false
    disk:
      name: gara-data
      mountPath: /var/data
      sizeGB: 1
