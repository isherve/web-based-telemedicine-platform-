# Render API backend (pairs with Vercel frontend at web-based-telemedicine-platform.vercel.app)
# Render Blueprint reads this file from the repo root on push to main.

services:
  - type: web
    name: gara-api
    runtime: node
    repo: https://github.com/isherve/web-based-telemedicine-platform-
    plan: free
    region: frankfurt
    buildCommand: npm install --prefix server --omit=dev
    startCommand: cd server && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        value: https://web-based-telemedicine-platform.vercel.app
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_API_KEY
        sync: false
      - key: DOCTOR_REGISTRATION_TOKEN
        sync: false
      - key: FINANCE_REGISTRATION_TOKEN
        sync: false
      - key: PHARMACY_REGISTRATION_TOKEN
        sync: false
