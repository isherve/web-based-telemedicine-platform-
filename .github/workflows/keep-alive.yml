# Keep Render free-tier API warm (sleeps after ~15 min idle).
name: Keep API warm

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping gara-api health
        run: |
          curl -fsS --max-time 90 https://gara-api.onrender.com/api/health
          echo " — API is up"
